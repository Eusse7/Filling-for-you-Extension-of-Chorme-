<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autofill Demo</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  </head>
  <body>
    <div class="header">
      <h3>Filling for you</h3>
      <div class="themeToggle">
        <i class="fa fa-moon-o" aria-hidden="true"></i>
        <label class="switch" for="toggleTheme">
          <input id="toggleTheme" type="checkbox" aria-label="Modo oscuro" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="muted">
      Para actualizar tus datos, ve a tu perfil en la web. Si no has iniciado sesión, te llevará a login.
    </div>

    <div class="row">
      <button id="openProfile">Ir a mi perfil</button>
      <button id="fill">Previsualizar y llenar</button>
    </div>
    <div class="row" id="blacklist-warning" style="display: none; background: #fee2e2; color: #b91c1c; border-radius: 4px; padding: 4px 10px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box;">
      ⚠️ Extensión desactivada aquí
    </div>
    <div class="row">
      <button id="clearFields" class="secondary" title="Vacia los campos autocompletados">Borrar campos llenados</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
