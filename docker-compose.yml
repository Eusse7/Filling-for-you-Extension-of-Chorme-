services:
  db:
    image: postgres:16-alpine
    container_name: filling-for-you-db
    environment:
      POSTGRES_DB: autofill
      POSTGRES_USER: autofill
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    container_name: filling-for-you-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql+psycopg://autofill:${DB_PASSWORD:-change_me_in_prod}@db:5432/autofill
      BOOTSTRAP_USER_EMAIL: demo@fillingforyou.local
      DEMO_TOKEN: demo-token
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@fillingforyou.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      PASSWORD_RESET_CODE_MINUTES: 10
      PASSWORD_RESET_CODE_MAX_ATTEMPTS: 5
    volumes:
      - api_data:/app/data
    depends_on:
      - db
      - mailhog

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: filling-for-you-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: ./web
    container_name: filling-for-you-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:3000
    depends_on:
      - api

volumes:
  api_data:
  postgres_data:
